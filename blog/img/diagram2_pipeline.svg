<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 230" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Spec에서 환경 BT까지의 4단계 합성 파이프라인</title>
  <desc>자연어 Spec을 입력으로 받아 행위 추출, 노드 분해, 골격 합성, 노드 결합 4단계를 거쳐 결정적으로 실행되는 BT를 출력함.</desc>
  <style>
    text { font-family: "Malgun Gothic", "맑은 고딕", "Apple SD Gothic Neo", "Noto Sans KR", "Noto Sans CJK KR", "Nanum Gothic", sans-serif; }
    .title { font-size: 16px; font-weight: 600; fill: #111827; }
    .stage { font-size: 13px; font-weight: 600; fill: #111827; }
    .small { font-size: 11px; fill: #6b7280; }
    .num { font-size: 11px; font-weight: 600; fill: #6b7280; }
    .box { fill: #f3f4f6; stroke: #d1d5db; stroke-width: 1.5; }
    .box-io { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.8; }
    .arrow-line { stroke: #9ca3af; stroke-width: 1.6; fill: none; }
    .arrow { fill: #6b7280; }
  </style>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
  <rect width="800" height="230" fill="#ffffff"/>
  <text x="400" y="28" text-anchor="middle" class="title">Spec → 환경 BT 합성 4단계 파이프라인</text>

  <rect x="20" y="85" width="90" height="60" rx="6" class="box-io"/>
  <text x="65" y="113" text-anchor="middle" class="stage">Spec</text>
  <text x="65" y="131" text-anchor="middle" class="small">자연어</text>
  <line x1="115" y1="115" x2="148" y2="115" class="arrow-line" marker-end="url(#ah)"/>

  <rect x="153" y="85" width="120" height="60" rx="6" class="box"/>
  <text x="213" y="103" text-anchor="middle" class="num">①</text>
  <text x="213" y="121" text-anchor="middle" class="stage">행위 추출</text>
  <text x="213" y="138" text-anchor="middle" class="small">Extract</text>
  <line x1="278" y1="115" x2="308" y2="115" class="arrow-line" marker-end="url(#ah)"/>

  <rect x="313" y="85" width="120" height="60" rx="6" class="box"/>
  <text x="373" y="103" text-anchor="middle" class="num">②</text>
  <text x="373" y="121" text-anchor="middle" class="stage">노드 분해</text>
  <text x="373" y="138" text-anchor="middle" class="small">Decompose</text>
  <line x1="438" y1="115" x2="468" y2="115" class="arrow-line" marker-end="url(#ah)"/>

  <rect x="473" y="85" width="120" height="60" rx="6" class="box"/>
  <text x="533" y="103" text-anchor="middle" class="num">③</text>
  <text x="533" y="121" text-anchor="middle" class="stage">골격 합성</text>
  <text x="533" y="138" text-anchor="middle" class="small">Skeleton</text>
  <line x1="598" y1="115" x2="628" y2="115" class="arrow-line" marker-end="url(#ah)"/>

  <rect x="633" y="85" width="120" height="60" rx="6" class="box"/>
  <text x="693" y="103" text-anchor="middle" class="num">④</text>
  <text x="693" y="121" text-anchor="middle" class="stage">노드 결합</text>
  <text x="693" y="138" text-anchor="middle" class="small">Ground</text>

  <line x1="693" y1="150" x2="693" y2="175" class="arrow-line" marker-end="url(#ah)"/>
  <rect x="638" y="180" width="110" height="40" rx="6" class="box-io"/>
  <text x="693" y="198" text-anchor="middle" class="stage">BT</text>
  <text x="693" y="213" text-anchor="middle" class="small">결정적 실행</text>
</svg>
