Edge Artificial Intelligence:
  description: 엣지 인공지능 - 클라우드가 아닌 로컬 기기에서 AI 연산을 수행하는 기술
Efficiency:
  description: 효율성 - 자원 대비 성과의 비율 또는 작업 수행의 경제성
Elementary Effect:
