Fault Localization:
  description: 결함 위치 추적 - 소프트웨어 내 오류가 발생한 정확한 위치를 식별하는 디버깅 기법
Feature Attribution:
  description: 특성 귀속 - 모델 예측에 대한 각 입력 특성의 기여도를 계산하는 기법
Feature Importance:
  description: 특성 중요도 - 모델 성능에 각 특성이 미치는 영향의 상대적 크기
Feature Selection:
