Fabric Defect:
  description: 직물 결함 - 섬유 제품에 발생하는 품질 불량이나 외관 결함
Fabric Defect Detection:
  description: 직물 결함 검출 - 자동화 시스템으로 직물의 결함을 식별하고 분류하는 기술
Fabric Defects:
