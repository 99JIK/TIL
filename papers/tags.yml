Feed Forward Back Propagation:
  description: 순전파 역전파 - 신경망의 학습 알고리즘으로 오차를 역방향으로 전파하여 가중치를 조정
Few-Shot Learning:
  description: 소수샷 학습 - 매우 적은 수의 예제만으로 새로운 작업을 학습하는 기법
Fiber Reinforced Recycled Aggregate Concrete:
  description: 섬유 보강 재활용 골재 콘크리트 - 섬유와 재활용 골재를 사용한 친환경 고강도 콘크리트
Fiber-reinforced Concrete:
  description: 섬유 보강 콘크리트 - 섬유를 첨가하여 인장 강도와 인성을 향상시킨 콘크리트
First Person Shooter:
